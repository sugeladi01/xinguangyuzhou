<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1520"/>
      <stop offset="100%" stop-color="#08060d"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5e6a3"/>
      <stop offset="50%" stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#f0d78c"/>
    </linearGradient>
    <linearGradient id="goldLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5e6a3"/>
      <stop offset="100%" stop-color="#e0c068"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="yinClip">
      <circle cx="32" cy="32" r="18"/>
    </clipPath>
  </defs>

  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="url(#bg)" stroke="url(#gold)" stroke-width="1.5" opacity="0.9"/>

  <!-- Outer subtle ring -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="url(#gold)" stroke-width="0.5" opacity="0.3"/>

  <!-- Taiji - Yang (light) half -->
  <g clip-path="url(#yinClip)" filter="url(#glow)">
    <circle cx="32" cy="32" r="18" fill="url(#gold)"/>
    <!-- Yang dot -->
    <circle cx="32" cy="23" r="3.5" fill="#1a1520"/>
  </g>

  <!-- Taiji - Yin (dark) half -->
  <g clip-path="url(#yinClip)" filter="url(#glow)">
    <path d="M32,14 A18,18 0 0,0 32,50 A9,9 0 0,0 32,32 A9,9 0 0,1 32,14" fill="#1a1520"/>
    <!-- Yin dot -->
    <circle cx="32" cy="41" r="3.5" fill="url(#goldLight)"/>
  </g>

  <!-- S-curve refinement -->
  <path d="M32,14 A9,9 0 0,1 32,32 A9,9 0 0,0 32,50" fill="none" stroke="url(#gold)" stroke-width="0.5" opacity="0.5"/>

  <!-- Outer glow ring -->
  <circle cx="32" cy="32" r="22" fill="none" stroke="url(#gold)" stroke-width="0.3" opacity="0.15" filter="url(#softGlow)"/>

  <!-- Corner accent dots -->
  <circle cx="32" cy="4" r="1" fill="#c9a84c" opacity="0.6" filter="url(#glow)"/>
  <circle cx="32" cy="60" r="1" fill="#c9a84c" opacity="0.6" filter="url(#glow)"/>
  <circle cx="4" cy="32" r="1" fill="#c9a84c" opacity="0.6" filter="url(#glow)"/>
  <circle cx="60" cy="32" r="1" fill="#c9a84c" opacity="0.6" filter="url(#glow)"/>
</svg>