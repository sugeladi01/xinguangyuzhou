<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>留言板 · 校园正能量</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@400;600;700;900&family=JetBrains+Mono:wght@400;500&family=ZCOOL+XiaoWei&family=Ma+Shan+Zheng&family=LXGW+WenKai&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/tools.css">
</head>
<body>
    <canvas id="particle-canvas"></canvas>
    <nav id="global-nav">
        <div class="nav-inner">
            <a class="nav-logo" href="index.html"><i class="fas fa-atom"></i> 正能量</a>
            <a class="nav-link" href="index.html"><i class="fas fa-home"></i> 首页</a>
            <a class="nav-link" href="index.html"><i class="fas fa-yin-yang"></i> 心学</a>
            <a class="nav-link" href="index.html"><i class="fas fa-flask"></i> 科学</a>
            <a class="nav-link" href="index.html"><i class="fas fa-star"></i> 分享</a>
            <div class="nav-divider"></div>
            <a class="nav-link" href="tools.html"><i class="fas fa-tools"></i> 工具</a>
            <a class="nav-link" href="seminar.html"><i class="fas fa-comments"></i> 研讨</a>
            <a class="nav-link active" href="message.html"><i class="fas fa-paper-plane"></i> 留言</a>
        </div>
    </nav>

    <div class="tool-page-body">
        <div class="tool-page">
            <div class="page-header">
                <h1><i class="fas fa-paper-plane"></i> 留言板</h1>
                <p>在这里留下你的思考、感悟或祝福，让正能量在校园中传递</p>
            </div>

            <!-- Post Message Form -->
            <div class="tool-card" style="max-width:800px;margin:0 auto 2rem;" id="msg-form-card">
                <h3>留下你的心声</h3>
                <div id="msg-login-hint" style="display:none;margin-bottom:1rem;padding:0.8rem 1rem;border-radius:10px;background:rgba(201,168,76,0.06);border:1px solid rgba(201,168,76,0.1);font-size:0.82rem;color:#b0aca4;">
                    <i class="fas fa-info-circle" style="color:#e0c868;margin-right:6px;"></i>
                    发布留言需要先 <a href="javascript:void(0)" onclick="showLoginModal()" style="color:#e0c868;text-decoration:underline;">登录</a>
                </div>
                <div id="msg-form-fields">
                    <div class="form-group" id="msg-name-group">
                        <label>昵称</label>
                        <input type="text" class="form-input" id="msg-name" placeholder="你的名字...">
                    </div>
                    <div class="form-group">
                        <label>留言内容</label>
                        <textarea class="form-textarea" id="msg-content" placeholder="写下你的思考、感悟或祝福..."></textarea>
                    </div>
                    <button class="btn btn-gold" id="msg-submit" style="width:100%;">
                        <i class="fas fa-paper-plane"></i> 发布留言
                    </button>
                </div>
            </div>

            <!-- Message Timeline -->
            <div style="max-width:800px;margin:0 auto;">
                <div class="message-timeline" id="msg-timeline">
                    <div style="text-align:center;padding:2rem;color:#8a8680;">
                        <i class="fas fa-spinner fa-spin" style="font-size:1.2rem;"></i>
                        <p style="margin-top:0.5rem;">加载留言中...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/particles.js"></script>
    <script src="js/api.js"></script>
    <script>
        // ===== 加载留言列表 =====
        async function loadMessages() {
            const timeline = document.getElementById('msg-timeline');
            try {
                const res = await MessagesAPI.getList(1, 50);
                if (res.code === 200 && res.data && res.data.list) {
                    const list = res.data.list;
                    if (list.length === 0) {
                        timeline.innerHTML = '<div style="text-align:center;padding:2rem;color:#8a8680;">暂无留言，来留下第一条吧 ✨</div>';
                        return;
                    }
                    timeline.innerHTML = list.map(msg => {
                        const d = new Date(msg.created_at);
                        const timeStr = `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日 · ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
                        const avatar = (msg.avatar && msg.avatar !== 'null') ? msg.avatar : msg.nickname ? msg.nickname.charAt(0) : '?';
                        return `<div class="message-item">
                            <div class="msg-author">${msg.nickname || '匿名'}</div>
                            <div class="msg-time">${timeStr}</div>
                            <div class="msg-content">${escapeHtml(msg.content)}</div>
                        </div>`;
                    }).join('');
                    // 入场动画
                    gsap.from('.message-item', { opacity: 0, y: -15, duration: 0.4, stagger: 0.06, ease: 'power2.out' });
                } else {
                    timeline.innerHTML = '<div style="text-align:center;padding:2rem;color:#8a8680;">加载失败，请刷新重试</div>';
                }
            } catch (err) {
                timeline.innerHTML = '<div style="text-align:center;padding:2rem;color:#8a8680;">网络错误，请检查连接</div>';
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ===== 更新登录状态显示 =====
        function updateMsgLoginState() {
            const user = TokenManager.getUser();
            const loginHint = document.getElementById('msg-login-hint');
            const nameGroup = document.getElementById('msg-name-group');
            if (user) {
                loginHint.style.display = 'none';
                nameGroup.style.display = 'none';
                document.getElementById('msg-name').value = user.nickname || user.username || '';
            } else {
                loginHint.style.display = 'block';
                nameGroup.style.display = 'block';
            }
        }

        // ===== 登录弹窗 =====
        function showLoginModal() {
            // 如果已有弹窗就移除
            const existing = document.getElementById('login-modal');
            if (existing) existing.remove();

            const modal = document.createElement('div');
            modal.id = 'login-modal';
            modal.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:9999;display:flex;justify-content:center;align-items:center;backdrop-filter:blur(8px);';
            modal.innerHTML = `
                <div style="width:90%;max-width:380px;background:#14142c;border:1px solid rgba(201,168,76,0.2);border-radius:20px;padding:2rem;box-shadow:0 20px 60px rgba(0,0,0,0.5);">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;">
                        <h3 style="font-family:'ZCOOL XiaoWei',serif;color:#fff;font-size:1.1rem;">登录 · 心光宇宙</h3>
                        <button onclick="document.getElementById('login-modal').remove()" style="width:28px;height:28px;border-radius:50%;border:1px solid rgba(201,168,76,0.15);background:transparent;color:#b0aca4;cursor:pointer;font-size:0.75rem;">✕</button>
                    </div>
                    <div id="login-tab-row" style="display:flex;gap:0;margin-bottom:1.2rem;background:rgba(14,14,35,0.6);border-radius:12px;padding:3px;">
                        <button class="login-tab active" onclick="switchLoginTab('login')" style="flex:1;padding:8px;border-radius:10px;border:none;background:rgba(201,168,76,0.1);color:#e0c868;font-family:'LXGW WenKai',sans-serif;font-size:0.82rem;cursor:pointer;">登录</button>
                        <button class="login-tab" onclick="switchLoginTab('register')" style="flex:1;padding:8px;border-radius:10px;border:none;background:transparent;color:#8a8680;font-family:'LXGW WenKai',sans-serif;font-size:0.82rem;cursor:pointer;">注册</button>
                    </div>
                    <div id="login-form">
                        <div style="margin-bottom:0.8rem;">
                            <label style="display:block;font-size:0.72rem;color:#b0aca4;margin-bottom:4px;">用户名</label>
                            <input type="text" id="login-username" placeholder="输入用户名" style="width:100%;padding:10px 14px;border-radius:12px;border:1px solid rgba(201,168,76,0.12);background:rgba(10,10,25,0.6);color:#e8e4dc;font-family:'LXGW WenKai',sans-serif;font-size:0.82rem;outline:none;">
                        </div>
                        <div style="margin-bottom:0.8rem;">
                            <label style="display:block;font-size:0.72rem;color:#b0aca4;margin-bottom:4px;">密码</label>
                            <input type="password" id="login-password" placeholder="输入密码" style="width:100%;padding:10px 14px;border-radius:12px;border:1px solid rgba(201,168,76,0.12);background:rgba(10,10,25,0.6);color:#e8e4dc;font-family:'LXGW WenKai',sans-serif;font-size:0.82rem;outline:none;">
                        </div>
                        <div id="register-nickname-row" style="margin-bottom:0.8rem;display:none;">
                            <label style="display:block;font-size:0.72rem;color:#b0aca4;margin-bottom:4px;">昵称</label>
                            <input type="text" id="register-nickname" placeholder="你的昵称" style="width:100%;padding:10px 14px;border-radius:12px;border:1px solid rgba(201,168,76,0.12);background:rgba(10,10,25,0.6);color:#e8e4dc;font-family:'LXGW WenKai',sans-serif;font-size:0.82rem;outline:none;">
                        </div>
                        <div id="login-error" style="display:none;margin-bottom:0.8rem;padding:6px 10px;border-radius:8px;background:rgba(224,96,80,0.1);border:1px solid rgba(224,96,80,0.2);color:#e06050;font-size:0.78rem;"></div>
                        <button id="login-submit-btn" onclick="handleLogin()" style="width:100%;padding:10px;border-radius:12px;border:none;background:linear-gradient(135deg,#e0c868,#c89030);color:#0a0a10;font-family:'LXGW WenKai',sans-serif;font-size:0.85rem;font-weight:600;cursor:pointer;">登录</button>
                    </div>
                </div>
            `;
            modal.addEventListener('click', (e) => { if (e.target === modal) modal.remove(); });
            document.body.appendChild(modal);
        }

        let currentLoginTab = 'login';
        function switchLoginTab(tab) {
            currentLoginTab = tab;
            const tabs = document.querySelectorAll('.login-tab');
            tabs[0].style.background = tab === 'login' ? 'rgba(201,168,76,0.1)' : 'transparent';
            tabs[0].style.color = tab === 'login' ? '#e0c868' : '#8a8680';
            tabs[1].style.background = tab === 'register' ? 'rgba(201,168,76,0.1)' : 'transparent';
            tabs[1].style.color = tab === 'register' ? '#e0c868' : '#8a8680';
            document.getElementById('register-nickname-row').style.display = tab === 'register' ? 'block' : 'none';
            document.getElementById('login-submit-btn').textContent = tab === 'login' ? '登录' : '注册';
        }

        async function handleLogin() {
            const username = document.getElementById('login-username').value.trim();
            const password = document.getElementById('login-password').value;
            const errorEl = document.getElementById('login-error');
            if (!username || !password) { errorEl.textContent = '请填写用户名和密码'; errorEl.style.display = 'block'; return; }

            let res;
            if (currentLoginTab === 'login') {
                res = await AuthAPI.login(username, password);
            } else {
                const nickname = document.getElementById('register-nickname').value.trim();
                if (!nickname) { errorEl.textContent = '请填写昵称'; errorEl.style.display = 'block'; return; }
                if (password.length < 6) { errorEl.textContent = '密码至少6位'; errorEl.style.display = 'block'; return; }
                res = await AuthAPI.register(username, password, nickname);
            }

            if (res.code === 200 || res.code === 201) {
                document.getElementById('login-modal').remove();
                updateMsgLoginState();
            } else {
                errorEl.textContent = res.message || '操作失败，请重试';
                errorEl.style.display = 'block';
            }
        }

        // ===== 发布留言 =====
        document.getElementById('msg-submit')?.addEventListener('click', async () => {
            const content = document.getElementById('msg-content').value.trim();
            if (!content) { alert('请输入留言内容'); return; }

            if (!TokenManager.isLoggedIn()) {
                showLoginModal();
                return;
            }

            const btn = document.getElementById('msg-submit');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 发布中...';

            const res = await MessagesAPI.create(content);
            if (res.code === 201) {
                document.getElementById('msg-content').value = '';
                loadMessages(); // 重新加载
                btn.innerHTML = '<i class="fas fa-check"></i> 发布成功';
                setTimeout(() => { btn.innerHTML = '<i class="fas fa-paper-plane"></i> 发布留言'; btn.disabled = false; }, 1500);
            } else {
                alert(res.message || '发布失败，请重试');
                btn.innerHTML = '<i class="fas fa-paper-plane"></i> 发布留言';
                btn.disabled = false;
            }
        });

        // ===== 初始化 =====
        document.addEventListener('DOMContentLoaded', () => {
            updateMsgLoginState();
            loadMessages();
        });
    </script>
</body>
</html>
